<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Theophysics Blackboard — Visual Sketch Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Courier+Prime&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg: #1a1a1a;
            --chalk: #e8e4d9;
            --gold: #d4af37;
            --blue: #5b9bd5;
            --teal: #4ecdc4;
            --pink: #e88fa5;
            --orange: #f5a623;
            --green: #7bc67e;
            --red: #e05555;
            --purple: #a78bfa;
            --dim: #6b6860;
            --grid: #252525;
            --surface: #0a0a0a;
            --surface-light: #1f1f1f;
            --border: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--surface);
            color: var(--chalk);
            min-height: 100vh;
        }

        /* Header */
        .header {
            border-bottom: 1px solid #222;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gold);
            color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1rem;
        }

        .header-title { font-size: 1.125rem; font-weight: 700; }
        .header-sub { font-size: 0.75rem; color: var(--dim); }

        .header-actions { display: flex; gap: 0.5rem; }

        .btn {
            padding: 0.375rem 0.875rem;
            border-radius: 0.375rem;
            font-size: 0.8125rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .btn-ghost {
            background: #252525;
            color: #a0a0a0;
        }

        .btn-ghost:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .btn-primary {
            background: var(--gold);
            color: var(--bg);
            border-color: var(--gold);
            font-weight: 700;
        }

        .btn-primary:hover {
            background: #f4d03f;
        }

        /* Main layout */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 768px) {
            .controls { grid-template-columns: 1fr; }
        }

        .control-label {
            font-size: 0.6875rem;
            font-weight: 600;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.375rem;
        }

        .template-list {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .template-btn {
            padding: 0.5rem 0.75rem;
            border-radius: 0.375rem;
            text-align: left;
            font-size: 0.8125rem;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface-light);
            color: #a0a0a0;
            transition: all 0.2s;
        }

        .template-btn:hover {
            border-color: var(--gold);
            color: var(--chalk);
        }

        .template-btn.active {
            background: var(--gold);
            color: var(--bg);
            border-color: var(--gold);
            font-weight: 700;
        }

        .inputs { display: flex; flex-direction: column; gap: 0.75rem; }

        .text-input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.8125rem;
            background: var(--surface-light);
            color: var(--chalk);
            border: 1px solid var(--border);
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .text-input:focus { border-color: var(--gold); }
        .text-input::placeholder { color: #555; }

        /* Canvas wrapper */
        .canvas-wrap {
            border-radius: 0.5rem;
            overflow: hidden;
            border: 2px solid var(--border);
            background: var(--bg);
        }

        #blackboard {
            width: 100%;
            height: auto;
            display: block;
            cursor: crosshair;
        }

        .canvas-footer {
            margin-top: 0.75rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.6875rem;
            color: #444;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="logo">χ</div>
            <div>
                <div class="header-title">Theophysics Blackboard</div>
                <div class="header-sub">Visual Sketch Explainer · Download as PNG</div>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn btn-ghost" onclick="redraw()">↻ Redraw</button>
            <button class="btn btn-primary" onclick="downloadPNG()">↓ Download PNG</button>
        </div>
    </div>

    <!-- Main -->
    <div class="main">

        <!-- Controls -->
        <div class="controls">
            <div>
                <div class="control-label">Template</div>
                <div class="template-list" id="templateList"></div>
            </div>
            <div class="inputs">
                <div>
                    <div class="control-label">Custom Title (optional)</div>
                    <input type="text" class="text-input" id="customTitle" placeholder="Leave empty for default" oninput="redraw()"/>
                </div>
                <div>
                    <div class="control-label">Custom Subtitle (optional)</div>
                    <input type="text" class="text-input" id="customSubtitle" placeholder="Leave empty for default" oninput="redraw()"/>
                </div>
            </div>
        </div>

        <!-- Canvas -->
        <div class="canvas-wrap">
            <canvas id="blackboard" width="1800" height="1040"></canvas>
        </div>

        <div class="canvas-footer">
            <span>1800×1040px · Retina-ready · PNG download</span>
            <span>Click "Redraw" for a fresh sketch variation</span>
        </div>
    </div>

<script>
// ═══════════════════════════════════════════
// THEOPHYSICS BLACKBOARD ENGINE
// ═══════════════════════════════════════════

const C = {
    bg: '#1a1a1a', chalk: '#e8e4d9', gold: '#d4af37', blue: '#5b9bd5',
    teal: '#4ecdc4', pink: '#e88fa5', orange: '#f5a623', green: '#7bc67e',
    red: '#e05555', purple: '#a78bfa', dim: '#6b6860', grid: '#252525'
};

const F = {
    title: "64px 'Caveat', cursive",
    subtitle: "40px 'Caveat', cursive",
    body: "32px 'Caveat', cursive",
    label: "28px 'Caveat', cursive",
    small: "24px 'Caveat', cursive",
    tiny: "20px 'Caveat', cursive",
    mono: "28px 'Courier Prime', monospace",
    monoSm: "24px 'Courier Prime', monospace",
};

let currentTemplate = 'prism';

// ─── Sketch primitives ───

function sketchLine(ctx, x1, y1, x2, y2, jitter = 3) {
    ctx.beginPath();
    ctx.moveTo(x1 + rj(jitter), y1 + rj(jitter));
    const steps = Math.max(Math.floor(Math.hypot(x2 - x1, y2 - y1) / 30), 3);
    for (let i = 1; i <= steps; i++) {
        const t = i / steps;
        ctx.lineTo(x1 + (x2 - x1) * t + rj(jitter), y1 + (y2 - y1) * t + rj(jitter));
    }
    ctx.stroke();
}

function sketchRect(ctx, x, y, w, h, r = 12, jitter = 2.5) {
    ctx.beginPath();
    const steps = 80;
    for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        let px, py;
        if (t < 0.25) { const a = t * 4; px = x + r + (w - 2*r) * a; py = y; }
        else if (t < 0.5) { const a = (t - 0.25) * 4; px = x + w; py = y + r + (h - 2*r) * a; }
        else if (t < 0.75) { const a = (t - 0.5) * 4; px = x + w - r - (w - 2*r) * a; py = y + h; }
        else { const a = (t - 0.75) * 4; px = x; py = y + h - r - (h - 2*r) * a; }
        px += rj(jitter); py += rj(jitter);
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.stroke();
}

function sketchArrow(ctx, x1, y1, x2, y2, jitter = 3) {
    sketchLine(ctx, x1, y1, x2, y2, jitter);
    const a = Math.atan2(y2 - y1, x2 - x1), hl = 20;
    sketchLine(ctx, x2, y2, x2 - hl * Math.cos(a - 0.4), y2 - hl * Math.sin(a - 0.4), 1.5);
    sketchLine(ctx, x2, y2, x2 - hl * Math.cos(a + 0.4), y2 - hl * Math.sin(a + 0.4), 1.5);
}

function sketchCircle(ctx, cx, cy, r, jitter = 2.5) {
    ctx.beginPath();
    for (let i = 0; i <= 50; i++) {
        const a = (i / 50) * Math.PI * 2;
        const px = cx + r * Math.cos(a) + rj(jitter);
        const py = cy + r * Math.sin(a) + rj(jitter);
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.stroke();
}

function chalkText(ctx, text, x, y, opts = {}) {
    const { font = F.body, color = C.chalk, align = 'left', maxW } = opts;
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.globalAlpha = 0.85 + Math.random() * 0.15;
    if (maxW) {
        const words = text.split(' ');
        let line = '', lineY = y;
        for (const w of words) {
            const test = line + w + ' ';
            if (ctx.measureText(test).width > maxW && line) {
                ctx.fillText(line.trim(), x, lineY);
                line = w + ' ';
                lineY += parseInt(font) * 1.4;
            } else line = test;
        }
        ctx.fillText(line.trim(), x, lineY);
        ctx.globalAlpha = 1;
        return lineY;
    }
    ctx.fillText(text, x, y);
    ctx.globalAlpha = 1;
    return y;
}

function rj(n) { return (Math.random() - 0.5) * n; }

// ─── Template: PRISM ───

function drawPrism(ctx, W, H, data) {
    chalkText(ctx, data.title || 'The Prism: One Equation, Seven Domains', W/2, 80, { font: F.title, color: C.gold, align: 'center' });
    chalkText(ctx, data.subtitle || 'LLC = f(G, S, K, E, Φ, M, D, C, T, σ)', W/2, 140, { font: F.mono, color: C.chalk, align: 'center' });

    // Prism triangle
    const px = 280, py = 280;
    ctx.strokeStyle = C.gold; ctx.lineWidth = 4;
    sketchLine(ctx, px, py, px - 100, py + 140);
    sketchLine(ctx, px - 100, py + 140, px + 100, py + 140);
    sketchLine(ctx, px + 100, py + 140, px, py);
    chalkText(ctx, 'LLC', px, py + 95, { font: F.subtitle, color: C.gold, align: 'center' });

    // Input ray
    ctx.strokeStyle = C.chalk; ctx.lineWidth = 3;
    sketchArrow(ctx, 40, py + 70, px - 110, py + 70, 2);
    chalkText(ctx, 'One Equation', 50, py + 50, { font: F.small, color: C.dim });

    const domains = [
        { name: 'Theology', v: 'G', color: C.gold, eq: 'Grace Operator' },
        { name: 'Information', v: 'K', color: C.blue, eq: 'Shannon / Kolmogorov' },
        { name: 'Quantum', v: 'S', color: C.teal, eq: 'Modified Schrödinger' },
        { name: 'Consciousness', v: 'Φ', color: C.pink, eq: 'IIT / Phi Threshold' },
        { name: 'Morality', v: 'M', color: C.orange, eq: 'Coherence Functional' },
        { name: 'Sign / Grace', v: 'σ', color: C.green, eq: 'Sign Algebra (σ = ±1)' },
        { name: 'Destiny', v: 'D', color: C.purple, eq: 'Logistic Attractor' },
    ];

    const startX = px + 110, startY = py + 70;
    domains.forEach((d, i) => {
        const endY = 220 + i * 95;
        const endX = W - 60;

        // Ray
        ctx.strokeStyle = d.color; ctx.lineWidth = 2.5;
        sketchArrow(ctx, startX, startY, endX - 420, endY, 2);

        // Domain box
        ctx.strokeStyle = d.color; ctx.lineWidth = 2.5;
        sketchRect(ctx, endX - 415, endY - 30, 420, 60, 10, 2);

        // Variable circle
        ctx.strokeStyle = d.color; ctx.lineWidth = 2;
        sketchCircle(ctx, endX - 385, endY, 22, 1.5);
        chalkText(ctx, d.v, endX - 385, endY + 10, { font: F.label, color: d.color, align: 'center' });

        // Name & equation
        chalkText(ctx, d.name, endX - 350, endY + 4, { font: F.label, color: C.chalk });
        chalkText(ctx, '→ ' + d.eq, endX - 350, endY + 30, { font: F.tiny, color: C.dim });
    });

    // Bottom insight
    ctx.strokeStyle = C.gold; ctx.lineWidth = 2;
    sketchRect(ctx, 60, H - 120, W - 120, 70, 12, 2);
    chalkText(ctx, data.insight || 'The LLC is the zip file. The 188 axioms are the unzipped folder.', W/2, H - 75, {
        font: F.body, color: C.gold, align: 'center'
    });
}

// ─── Template: THREE-COLUMN METHOD ───

function drawMethod(ctx, W, H, data) {
    chalkText(ctx, data.title || '[Paper Title]', W/2, 70, { font: F.title, color: C.gold, align: 'center' });
    chalkText(ctx, data.subtitle || 'Cross-Domain Structural Analysis', W/2, 120, { font: F.subtitle, color: C.chalk, align: 'center' });

    const cols = [
        { title: 'THE PROBLEM', color: C.red, items: ['Physics and theology', 'treated as separate domains', 'No shared formalism', 'Cross-domain = "just analogy"', 'No kill conditions'] },
        { title: 'THE METHOD', color: C.teal, items: ['Identify structural', 'isomorphisms (not analogies)', 'Test with kill conditions', 'Map to LLC variables', 'Declare axioms up front'] },
        { title: 'KEY RESULTS', color: C.green, items: ['24 properties match (DT-001)', 'Sign algebra = Grace (ISO-012)', '7 domain projections verified', '188 axioms mapped to 10 vars', 'Kill conditions: NOT MET'] },
    ];

    const colW = (W - 160) / 3;
    cols.forEach((col, i) => {
        const cx = 60 + i * (colW + 20);

        // Header box
        ctx.strokeStyle = col.color; ctx.lineWidth = 3;
        sketchRect(ctx, cx, 170, colW, 60, 10, 2);
        chalkText(ctx, col.title, cx + colW/2, 210, { font: F.label, color: col.color, align: 'center' });

        // Items
        col.items.forEach((item, j) => {
            const iy = 260 + j * 50;
            ctx.strokeStyle = C.dim; ctx.lineWidth = 1.5;
            sketchLine(ctx, cx + 15, iy + 15, cx + 30, iy + 15, 1);
            chalkText(ctx, item, cx + 40, iy + 22, { font: F.label, color: C.chalk });
        });
    });

    // Arrows between columns
    ctx.strokeStyle = C.gold; ctx.lineWidth = 3;
    sketchArrow(ctx, 60 + colW + 5, 200, 75 + colW, 200, 2);
    sketchArrow(ctx, 60 + 2*(colW + 20) - 15, 200, 60 + 2*(colW + 20), 200, 2);

    // Hub diagram at bottom
    const hubY = H - 200;
    ctx.strokeStyle = C.gold; ctx.lineWidth = 3;
    sketchCircle(ctx, W/2, hubY, 70, 2);
    chalkText(ctx, 'LLC', W/2, hubY + 12, { font: F.subtitle, color: C.gold, align: 'center' });

    const conns = [
        { label: 'Physics', angle: -2.5, color: C.blue },
        { label: 'Theology', angle: -1.8, color: C.gold },
        { label: 'Info', angle: -1.1, color: C.teal },
        { label: 'Mind', angle: -0.4, color: C.pink },
        { label: 'Moral', angle: 0.3, color: C.orange },
        { label: 'Quantum', angle: 1.0, color: C.green },
        { label: 'Destiny', angle: 1.7, color: C.purple },
    ];

    conns.forEach(c => {
        const ex = W/2 + 200 * Math.cos(c.angle);
        const ey = hubY + 120 * Math.sin(c.angle);
        ctx.strokeStyle = c.color; ctx.lineWidth = 2;
        sketchArrow(ctx, W/2 + 80 * Math.cos(c.angle), hubY + 80 * Math.sin(c.angle), ex, ey, 1.5);
        chalkText(ctx, c.label, ex + 25 * Math.cos(c.angle), ey + 25 * Math.sin(c.angle), {
            font: F.small, color: c.color, align: 'center'
        });
    });
}

// ─── Template: KILL CONDITIONS ───

function drawKills(ctx, W, H, data) {
    chalkText(ctx, data.title || 'Kill Conditions', W/2, 70, { font: F.title, color: C.red, align: 'center' });
    chalkText(ctx, data.subtitle || 'What would destroy this argument? We name them.', W/2, 120, {
        font: F.body, color: C.dim, align: 'center'
    });

    const kills = [
        { text: 'Find one of 24 properties that genuinely belongs to only one domain (math, morality, or God) but not the others.', status: 'NOT MET', danger: 'high' },
        { text: 'Show that σ (sign operator) doesn\'t commute with self-generated unitary operations — i.e. you CAN flip your own sign from inside.', status: 'NOT MET', danger: 'high' },
        { text: 'Prove that coherence can self-increase in a closed system (violating T3.1) — i.e. you can save yourself without external input.', status: 'NOT TESTED', danger: 'medium' },
        { text: 'Demonstrate that the LLC domain projections produce equations inconsistent with their parent fields.', status: 'NOT TESTED', danger: 'medium' },
    ];

    kills.forEach((k, i) => {
        const y = 170 + i * 160;
        const dangerColor = k.danger === 'high' ? C.red : C.orange;

        ctx.strokeStyle = dangerColor; ctx.lineWidth = 3;
        sketchRect(ctx, 60, y, W - 120, 130, 12, 2);

        // X icon
        ctx.strokeStyle = dangerColor; ctx.lineWidth = 4;
        sketchLine(ctx, 95, y + 40, 125, y + 70, 1.5);
        sketchLine(ctx, 125, y + 40, 95, y + 70, 1.5);

        // Text
        chalkText(ctx, k.text, 155, y + 45, { font: F.label, color: C.chalk, maxW: W - 500 });

        // Status badge
        const sc = k.status === 'NOT MET' ? C.green : k.status === 'MET' ? C.red : C.orange;
        ctx.strokeStyle = sc; ctx.lineWidth = 2;
        sketchRect(ctx, W - 310, y + 30, 200, 50, 8, 1.5);
        chalkText(ctx, k.status, W - 210, y + 63, { font: F.label, color: sc, align: 'center' });
    });

    // Bottom note
    ctx.strokeStyle = C.gold; ctx.lineWidth = 2;
    sketchRect(ctx, 100, H - 90, W - 200, 55, 10, 2);
    chalkText(ctx, 'We name these because hiding falsification conditions is dishonest.', W/2, H - 55, {
        font: F.body, color: C.gold, align: 'center'
    });
}

// ─── Template: SIGN OPERATOR ISO ───

function drawSign(ctx, W, H, data) {
    chalkText(ctx, data.title || 'The Sign Operator — ISO-012', W/2, 70, { font: F.title, color: C.teal, align: 'center' });
    chalkText(ctx, data.subtitle || 'Genuine structural isomorphism: physics ↔ theology', W/2, 120, {
        font: F.body, color: C.dim, align: 'center'
    });

    const boxW = (W - 180) / 2;

    // Physics box
    ctx.strokeStyle = C.blue; ctx.lineWidth = 3;
    sketchRect(ctx, 50, 170, boxW, 380, 14, 2);
    chalkText(ctx, 'PHYSICS', 50 + boxW/2, 220, { font: F.subtitle, color: C.blue, align: 'center' });

    chalkText(ctx, 'σ = ±1', 50 + boxW/2, 290, { font: F.mono, color: C.chalk, align: 'center' });
    chalkText(ctx, 'Eigenvalues of parity operator', 50 + boxW/2, 330, { font: F.label, color: C.dim, align: 'center' });

    chalkText(ctx, '[σ, U_self] = 0', 50 + boxW/2, 400, { font: F.mono, color: C.chalk, align: 'center' });
    chalkText(ctx, 'Sign commutes with self-operations', 50 + boxW/2, 440, { font: F.label, color: C.dim, align: 'center' });

    chalkText(ctx, '⇒ Can\'t flip own eigenvalue', 50 + boxW/2, 500, { font: F.body, color: C.blue, align: 'center' });

    // Theology box
    ctx.strokeStyle = C.gold; ctx.lineWidth = 3;
    sketchRect(ctx, W - 50 - boxW, 170, boxW, 380, 14, 2);
    chalkText(ctx, 'THEOLOGY', W - 50 - boxW/2, 220, { font: F.subtitle, color: C.gold, align: 'center' });

    chalkText(ctx, 'sin / grace', W - 50 - boxW/2, 290, { font: F.mono, color: C.chalk, align: 'center' });
    chalkText(ctx, 'Binary moral state', W - 50 - boxW/2, 330, { font: F.label, color: C.dim, align: 'center' });

    chalkText(ctx, 'Grace = external operator', W - 50 - boxW/2, 400, { font: F.mono, color: C.chalk, align: 'center' });
    chalkText(ctx, 'Transformation requires outside source', W - 50 - boxW/2, 440, { font: F.label, color: C.dim, align: 'center' });

    chalkText(ctx, '⇒ Can\'t save yourself', W - 50 - boxW/2, 500, { font: F.body, color: C.gold, align: 'center' });

    // Bridge arrows
    ctx.strokeStyle = C.teal; ctx.lineWidth = 4;
    const midX = W / 2;
    sketchArrow(ctx, midX - 50, 340, midX + 50, 340, 2);
    sketchArrow(ctx, midX + 50, 380, midX - 50, 380, 2);
    chalkText(ctx, 'ISO', midX, 325, { font: F.small, color: C.teal, align: 'center' });
    chalkText(ctx, '1:1', midX, 415, { font: F.small, color: C.teal, align: 'center' });

    // Verdict box
    ctx.strokeStyle = C.teal; ctx.lineWidth = 3;
    sketchRect(ctx, 80, 600, W - 160, 80, 12, 2);
    chalkText(ctx, 'VERDICT: Genuine structural isomorphism — bijective, operation-preserving', W/2, 650, {
        font: F.body, color: C.teal, align: 'center'
    });

    // Status
    ctx.strokeStyle = C.green; ctx.lineWidth = 2;
    sketchRect(ctx, W/2 - 200, H - 120, 400, 55, 10, 2);
    chalkText(ctx, 'ISO-012: DEMONSTRATED  ✓', W/2, H - 85, {
        font: F.subtitle, color: C.green, align: 'center'
    });
}

// ─── Template: 24 PROPERTIES ───

function draw24Props(ctx, W, H, data) {
    chalkText(ctx, data.title || 'The 24 Properties — DT-001', W/2, 70, { font: F.title, color: C.gold, align: 'center' });
    chalkText(ctx, data.subtitle || 'Three domains. Same fingerprint. Not analogy — identity.', W/2, 120, {
        font: F.body, color: C.dim, align: 'center'
    });

    // Three column headers
    const colW = (W - 200) / 3;
    const headers = [
        { name: 'MATHEMATICS', color: C.blue },
        { name: 'MORALITY', color: C.orange },
        { name: 'GOD', color: C.gold },
    ];

    headers.forEach((h, i) => {
        const cx = 70 + i * (colW + 15);
        ctx.strokeStyle = h.color; ctx.lineWidth = 3;
        sketchRect(ctx, cx, 160, colW, 55, 10, 2);
        chalkText(ctx, h.name, cx + colW/2, 197, { font: F.label, color: h.color, align: 'center' });
    });

    // Sample properties
    const props = [
        ['Necessary', 'Necessary', 'Necessary'],
        ['Eternal', 'Eternal', 'Eternal'],
        ['Immutable', 'Immutable', 'Immutable'],
        ['Universal', 'Universal', 'Universal'],
        ['Consistent', 'Consistent', 'Consistent'],
        ['Independent of belief', 'Independent of belief', 'Independent of belief'],
        ['Discovered, not invented', 'Discovered, not invented', 'Revealed, not invented'],
        ['Transcends physicality', 'Transcends physicality', 'Transcends physicality'],
    ];

    props.forEach((row, ri) => {
        const y = 245 + ri * 55;
        // Alternating subtle bg line
        if (ri % 2 === 0) {
            ctx.fillStyle = 'rgba(255,255,255,0.02)';
            ctx.fillRect(70, y - 10, W - 140, 45);
        }
        row.forEach((cell, ci) => {
            const cx = 70 + ci * (colW + 15);
            const col = ci === 0 ? C.blue : ci === 1 ? C.orange : C.gold;
            chalkText(ctx, cell, cx + colW/2, y + 20, { font: F.small, color: col, align: 'center' });
        });
    });

    // Vertical dotted lines
    ctx.strokeStyle = C.dim; ctx.lineWidth = 1; ctx.setLineDash([8, 8]);
    ctx.beginPath(); ctx.moveTo(70 + colW + 7, 220); ctx.lineTo(70 + colW + 7, 680); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(70 + 2*(colW + 15) - 8, 220); ctx.lineTo(70 + 2*(colW + 15) - 8, 680); ctx.stroke();
    ctx.setLineDash([]);

    // "..." indicator
    chalkText(ctx, '... 16 more properties ...', W/2, 710, { font: F.label, color: C.dim, align: 'center' });

    // Bottom insight
    ctx.strokeStyle = C.gold; ctx.lineWidth = 2;
    sketchRect(ctx, 80, H - 130, W - 160, 80, 12, 2);
    chalkText(ctx, 'Kill condition: Find ONE property unique to one domain.', W/2, H - 98, {
        font: F.body, color: C.red, align: 'center'
    });
    chalkText(ctx, 'Status: NOT MET across all 24.', W/2, H - 62, {
        font: F.body, color: C.green, align: 'center'
    });
}

// ─── Template: AUDIT ───

function drawAudit(ctx, W, H, data) {
    chalkText(ctx, data.title || 'The Audit — Honest Assessment', W/2, 70, { font: F.title, color: C.gold, align: 'center' });
    chalkText(ctx, data.subtitle || 'Every claim sorted into three tiers', W/2, 120, {
        font: F.body, color: C.dim, align: 'center'
    });

    // Three tiers
    const tiers = [
        {
            title: 'LOAD-BEARING',
            subtitle: 'These hold under scrutiny',
            color: C.green,
            icon: '✓',
            items: ['24-property convergence (DT-001)', 'Sign operator isomorphism (ISO-012)', 'Coherence can\'t self-increase (T3.1)']
        },
        {
            title: 'SUGGESTIVE',
            subtitle: 'Structural parallels — need formalization',
            color: C.orange,
            icon: '~',
            items: ['LLC domain projection completeness', 'Consciousness-substrate independence claim']
        },
        {
            title: 'OVERREACHED',
            subtitle: 'Where this paper went too far',
            color: C.red,
            icon: '✗',
            items: ['[Specific overreach or "Checked — none found"]']
        },
    ];

    let yPos = 160;
    tiers.forEach(tier => {
        const tierH = 50 + tier.items.length * 50;

        ctx.strokeStyle = tier.color; ctx.lineWidth = 3;
        sketchRect(ctx, 60, yPos, W - 120, tierH, 12, 2);

        // Header
        chalkText(ctx, tier.icon + '  ' + tier.title, 100, yPos + 40, { font: F.subtitle, color: tier.color });
        chalkText(ctx, tier.subtitle, 100, yPos + 72, { font: F.small, color: C.dim });

        // Items
        tier.items.forEach((item, i) => {
            const iy = yPos + 95 + i * 50;
            ctx.strokeStyle = tier.color; ctx.lineWidth = 2;
            sketchLine(ctx, 110, iy + 5, 130, iy + 5, 1);
            chalkText(ctx, item, 145, iy + 12, { font: F.label, color: C.chalk });
        });

        yPos += tierH + 25;
    });

    // Bottom quote
    chalkText(ctx, '"I looked for overreach in this article."', W/2, H - 60, {
        font: F.body, color: C.gold, align: 'center'
    });
    chalkText(ctx, '— This sentence, honestly meant, is worth ten pages of confident assertions.', W/2, H - 25, {
        font: F.small, color: C.dim, align: 'center'
    });
}

// TEMPLATE REGISTRY
// ═══════════════════════════════════════════

const TEMPLATES = {
    prism:   { name: 'The Prism — Domain Projections', draw: drawPrism },
    method:  { name: 'Three-Column Method', draw: drawMethod },
    kills:   { name: 'Kill Conditions', draw: drawKills },
    sign:    { name: 'Sign Operator ISO-012', draw: drawSign },
    props24: { name: '24 Properties (DT-001)', draw: draw24Props },
    audit:   { name: 'The Audit — Three Tiers', draw: drawAudit },
};

// ═══════════════════════════════════════════
// DRAW ENGINE
// ═══════════════════════════════════════════

function drawBlackboard() {
    const canvas = document.getElementById('blackboard');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    // Clear
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, W, H);

    // Subtle grid dots
    ctx.fillStyle = C.grid;
    for (let x = 30; x < W; x += 60) {
        for (let y = 30; y < H; y += 60) {
            ctx.beginPath();
            ctx.arc(x, y, 1.2, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Chalk dust
    ctx.fillStyle = 'rgba(255,255,255,0.012)';
    for (let i = 0; i < 400; i++) {
        ctx.beginPath();
        ctx.arc(Math.random() * W, Math.random() * H, Math.random() * 3, 0, Math.PI * 2);
        ctx.fill();
    }

    // Draw current template
    const data = {
        title: document.getElementById('customTitle').value || undefined,
        subtitle: document.getElementById('customSubtitle').value || undefined,
    };
    TEMPLATES[currentTemplate].draw(ctx, W, H, data);

    // Watermark
    chalkText(ctx, 'THEOPHYSICS · David Lowe · 2026', W - 30, H - 18, {
        font: "18px 'Courier Prime', monospace", color: C.dim, align: 'right'
    });
}

function redraw() { drawBlackboard(); }

function downloadPNG() {
    const canvas = document.getElementById('blackboard');
    const link = document.createElement('a');
    link.download = 'theophysics-blackboard-' + currentTemplate + '-' + Date.now() + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
}

function setTemplate(key) {
    currentTemplate = key;
    // Update button states
    document.querySelectorAll('.template-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.key === key);
    });
    drawBlackboard();
}

// Build template buttons
function initUI() {
    const list = document.getElementById('templateList');
    Object.entries(TEMPLATES).forEach(([key, val]) => {
        const btn = document.createElement('button');
        btn.className = 'template-btn' + (key === currentTemplate ? ' active' : '');
        btn.dataset.key = key;
        btn.textContent = val.name;
        btn.onclick = () => setTemplate(key);
        list.appendChild(btn);
    });
}

// Init
window.addEventListener('DOMContentLoaded', () => {
    initUI();
    // Wait for fonts to load
    document.fonts.ready.then(() => {
        drawBlackboard();
    });
});
</script>
